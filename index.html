<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Caption Roulette</title>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
    }

    #image {
      max-width: 90%;
      margin-top: 20px;
      border-radius: 8px;
      display: none;
      transition: filter 0.4s ease, opacity 0.4s ease;
      opacity: 0;
      filter: blur(12px);
    }

    button {
      padding: 12px 24px;
      font-size: 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #ff4081;
      color: white;
    }

    button:hover {
      background: #ff5c9a;
    }

    /* Spinner container */
    #spinner {
      margin-top: 20px;
      display: none;
    }

    /* Spinner animation */
    .loader {
      border: 6px solid #333;
      border-top: 6px solid #ff4081;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* --- NSFW Overlay (fixed visibility) --- */
    #nsfw-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.65); /* lighter so box stands out */
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.5s ease;
    }

    #nsfw-box {
      background: #333; /* brighter box */
      padding: 30px;
      border-radius: 10px;
      max-width: 350px;
      text-align: center;
      border: 2px solid #ff4081;
      color: white;
    }

    #nsfw-box h2 {
      margin-bottom: 10px;
      color: #ff80b3; /* pink highlight */
    }

    #nsfw-box button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      background: #ff4081;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: white;
    }

    #nsfw-box button:hover {
      background: #ff5c9a;
    }
  </style>
</head>
<body>

  <!-- NSFW Overlay -->
  <div id="nsfw-overlay">
    <div id="nsfw-box">
      <h2>⚠️ Content Warning</h2>
      <p>This site contains mature themes.<br>Viewer discretion advised.</p>
      <button onclick="dismissNSFW()">Continue</button>
    </div>
  </div>

  <h1>Caption Roulette 🎰</h1>
  <button onclick="spin()">Spin</button>

  <!-- Spinner -->
  <div id="spinner">
    <div class="loader"></div>
  </div>

  <!-- Image -->
  <div>
    <img id="image" src="">
  </div>

  <!-- Cache‑busted script -->
  <script src="script.js?v=6"></script>

</body>
</html>
