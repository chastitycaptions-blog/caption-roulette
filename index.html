<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chastity Caption Roulette</title>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
      margin: 0;
      overflow-x: hidden;
    }

    h1 {
      margin-top: 20px;
    }

    #main-controls {
      margin-top: 10px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 18px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #ff4081;
      color: white;
    }

    button:hover {
      background: #ff5c9a;
    }

    #branding {
      margin-top: 10px;
      font-size: 0.9rem;
      opacity: 0.7;
    }
    
    #branding a {
      color: #00eaff;
      text-decoration: none;
    }
    
    #branding a:hover {
      text-decoration: underline;
    }

    #image {
      max-width: 90%;
      margin-top: 20px;
      border-radius: 8px;
      display: none;
      transition: filter 0.4s ease, opacity 0.4s ease;
      opacity: 0;
      filter: blur(12px);
    }

    #source-link {
      margin-top: 8px;
      font-size: 14px;
      display: none;
    }

    #source-link a {
      color: #ff80b3;
      text-decoration: none;
    }

    #source-link a:hover {
      text-decoration: underline;
    }

    #favorite-btn {
      margin-top: 10px;
    }

    /* Spinner */
    #spinner {
      margin-top: 20px;
      display: none;
    }

    .loader {
      border: 6px solid #333;
      border-top: 6px solid #ff4081;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* NSFW Overlay */
    #nsfw-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999999;
      opacity: 1;
      transition: opacity 0.5s ease;
    }

    #nsfw-box {
      background: #333;
      padding: 30px;
      border-radius: 10px;
      max-width: 350px;
      text-align: center;
      border: 2px solid #ff4081;
      color: white;
      z-index: 1000000;
    }

    #nsfw-box h2 {
      margin-bottom: 10px;
      color: #ff80b3;
    }

    #nsfw-box button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      background: #ff4081;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: white;
    }

    #nsfw-box button:hover {
      background: #ff5c9a;
    }

    /* History panel */
    #history-toggle-btn {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 1000001;
      font-size: 14px;
      padding: 6px 10px;
      background: #333;
    }

    #history-container {
      position: fixed;
      top: 0;
      right: 0;
      width: 260px;
      height: 100vh;
      background: #181818;
      border-left: 1px solid #333;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 1000000;
      display: flex;
      flex-direction: column;
    }

    #history-container.open {
      transform: translateX(0);
    }

    #history-header {
      padding: 12px;
      border-bottom: 1px solid #333;
      font-size: 16px;
      font-weight: bold;
      text-align: left;
    }

    #history-list {
      padding: 8px;
      overflow-y: auto;
      flex: 1;
    }

    .history-item {
      border-bottom: 1px solid #333;
      padding-bottom: 8px;
      margin-bottom: 8px;
      text-align: left;
      font-size: 12px;
    }

    .history-thumb {
      width: 100%;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 4px;
    }

    .history-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 4px;
    }

    .history-meta a {
      color: #ff80b3;
      text-decoration: none;
      font-size: 11px;
    }

    .history-meta a:hover {
      text-decoration: underline;
    }

    .history-fav {
      cursor: pointer;
      font-size: 14px;
      color: #ff80b3;
    }

    /* Shuffle toggle */
    #shuffle-container {
      margin-top: 10px;
      font-size: 14px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }

    #shuffle-toggle {
      cursor: pointer;
    }

    /* Favorites button */
    #favorites-toggle-btn {
      position: fixed;
      top: 50px;
      right: 10px;
      z-index: 1000001;
      font-size: 14px;
      padding: 6px 10px;
      background: #333;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    #favorites-toggle-btn:hover {
      background: #444;
    }

    /* Favorites panel */
    #favorites-container {
      position: fixed;
      top: 0;
      right: 0;
      width: 260px;
      height: 100vh;
      background: #181818;
      border-left: 1px solid #333;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 1000000;
      display: flex;
      flex-direction: column;
    }

    #favorites-container.open {
      transform: translateX(0);
    }

    #favorites-header {
      padding: 12px;
      border-bottom: 1px solid #333;
      font-size: 16px;
      font-weight: bold;
      text-align: left;
    }

    #favorites-list {
      padding: 8px;
      overflow-y: auto;
      flex: 1;
    }
  </style>
</head>
<body>

  <!-- NSFW Overlay -->
  <div id="nsfw-overlay">
    <div id="nsfw-box">
      <h2>⚠️ Content Warning</h2>
      <p>This site contains mature themes.<br>Viewer discretion advised.</p>
      <button onclick="dismissNSFW()">Continue</button>
    </div>
  </div>

  <!-- History toggle button -->
  <button id="history-toggle-btn" onclick="toggleHistory()">History (H)</button>

  <!-- Favorites toggle button -->
  <button id="favorites-toggle-btn" onclick="toggleFavorites()">Favorites (★)</button>

  <!-- History panel -->
  <div id="history-container">
    <div id="history-header">History</div>
    <div id="history-list"></div>
  </div>

  <!-- Favorites panel -->
  <div id="favorites-container">
    <div id="favorites-header">Favorites</div>
    <div id="favorites-list"></div>
  </div>

  <h1>Chastity Caption Roulette 🎰</h1>

  <div id="main-controls">
    <!-- ⭐ Updated to call handleSpin() instead of spin() -->
    <button onclick="handleSpin()">Spin (Space)</button>
    <button id="favorite-btn" onclick="toggleFavorite()">♡ Favorite (F)</button>
  </div>

  <div id="branding">
    Powered by 
    <a href="https://www.tumblr.com/chastitycaptions-blog" target="_blank">
      chastitycaptions_blog
    </a>
  </div>
  
  <div id="shuffle-container">
    <input type="checkbox" id="shuffle-toggle" onchange="toggleShuffle()">
    <label for="shuffle-toggle">Shuffle mode (no repeats)</label>
  </div>

  <label class="sound-toggle">
    <input type="checkbox" id="sound-toggle" checked>
    Sound On
  </label>

  
  <!-- Spinner -->
  <div id="spinner">
    <div class="loader"></div>
  </div>

  <!-- Image -->
  <div>
    <img id="image" src="">
  </div>

  <!-- Source link -->
  <div id="source-link">
    Source: <a id="source-link-anchor" href="#" target="_blank" rel="noopener noreferrer"></a>
  </div>

  <!-- Sounds -->
  <audio id="sfx-spin" src="cowbell.mp3" preload="auto"></audio>
  <audio id="sfx-tick" src="tick.mp3" preload="auto"></audio>
  <audio id="sfx-ding" src="ding.mp3" preload="auto"></audio>

  <script src="script.js"></script>
</body>
</html>
