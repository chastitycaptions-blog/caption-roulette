<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Caption Roulette</title>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
    }

    #image {
      max-width: 90%;
      margin-top: 20px;
      border-radius: 8px;
      display: none;
      transition: filter 0.4s ease, opacity 0.4s ease;
      opacity: 0;
      filter: blur(12px);
    }

    button {
      padding: 12px 24px;
      font-size: 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #ff4081;
      color: white;
    }

    button:hover {
      background: #ff5c9a;
    }

    /* Spinner container */
    #spinner {
      margin-top: 20px;
      display: none;
    }

    /* Spinner animation */
    .loader {
      border: 6px solid #333;
      border-top: 6px solid #ff4081;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <h1>Caption Roulette 🎰</h1>
  <button onclick="spin()">Spin</button>

  <!-- Spinner -->
  <div id="spinner">
    <div class="loader"></div>
  </div>

  <!-- Image -->
  <div>
    <img id="image" src="">
  </div>

  <script src="script.js"></script>
</body>
</html>
